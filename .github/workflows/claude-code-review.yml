name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  claude-review:
    if: ${{ !contains(github.event.pull_request.title, '[skip-review]') }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
      issues: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@beta
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          allowed_bots: "dependabot"
          use_sticky_comment: true

          direct_prompt: |
            Review this pull request. Read the CLAUDE.md file first to understand project standards.

            ## Response format

            Scale your response to the PR:
            - Trivial changes (renames, label updates, config tweaks): one sentence like "No issues found." or a brief note if something is actually wrong. Do NOT manufacture feedback.
            - Small changes (< 50 lines): a short list of issues if any exist, otherwise 1-2 sentences.
            - Large changes (50+ lines, new features): a structured review, but still only covering actual issues.

            ## Rules

            1. ONLY flag real problems. If there are no issues, say "No issues found" and stop. Do NOT pad the review.
            2. NEVER include: todo checklists, "positive aspects" sections, summaries of what changed (the diff already shows this), security/performance assessments unless there's an actual vulnerability or bottleneck, approval/rejection recommendations.
            3. For each issue: state what's wrong, why it matters, and suggest a fix. Reference file:line.
            4. Do NOT suggest adding tests. This repo does not have tests yet.
            5. Do NOT suggest extracting helpers/utilities unless there are 3+ existing instances of duplication.
            6. Do NOT contradict yourself (e.g., flagging something then saying "actually this is fine").
            7. Do NOT suggest improvements that aren't problems (e.g., "consider using X" when the current approach works correctly).

            ## What to look for (in priority order)

            1. Bugs and logic errors
            2. Security vulnerabilities (XSS, injection, auth bypass, exposed secrets)
            3. Breaking changes or regressions
            4. Missing error handling for user-facing features
            5. TypeScript type safety (any types, unsafe casts, missing null checks)
            6. Violations of project patterns defined in CLAUDE.md
